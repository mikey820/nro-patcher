<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Patch Nintendo Switch homebrew NRO icons and metadata locally in your browser.">
  <meta name="theme-color" content="#0b0d12">
  <title>NRO Studio — Switch homebrew metadata editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a class="brand" href="./" aria-label="NRO Studio home">
        <span class="brand-mark" aria-hidden="true"><i></i><i></i></span>
        <span>NRO Studio</span>
      </a>
      <span class="local-note"><i></i> Files stay in your browser</span>
    </header>

    <div class="intro">
      <div>
        <h1>Customize a Switch NRO</h1>
        <p>Change its icon and metadata, then download the patched file.</p>
      </div>
      <a href="https://github.com/mikey820/nro-patcher" rel="noopener">GitHub ↗</a>
    </div>

    <section id="import-panel" class="card" aria-label="Choose an NRO">
      <input id="nro-input" class="visually-hidden" type="file" accept=".nro,application/octet-stream">
      <label id="drop-zone" class="drop-zone" for="nro-input" tabindex="0">
        <span class="upload-glyph" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 16V4m0 0L7.5 8.5M12 4l4.5 4.5M5 14v4a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-4"/></svg>
        </span>
        <span><strong>Drop an NRO here</strong><small>or click to browse</small></span>
      </label>
      <div id="import-error" class="notice error" role="alert" hidden></div>
    </section>

    <section id="editor-panel" class="card editor" aria-label="Customize NRO" hidden>
      <div class="file-row">
        <span class="file-icon">NRO</span>
        <span class="file-details"><strong id="file-name"></strong><small id="file-size"></small></span>
        <span class="valid-mark">Valid</span>
        <button id="replace-nro" class="text-button" type="button">Replace</button>
      </div>

      <div class="editor-grid">
        <div class="icon-editor">
          <div class="field-top"><label for="icon-input">App icon</label><span>256 × 256 JPEG</span></div>
          <div class="icon-frame">
            <img id="icon-preview" alt="Current homebrew icon">
            <div id="icon-empty" class="icon-empty" hidden>No icon</div>
          </div>
          <input id="icon-input" class="visually-hidden" type="file" accept="image/png,image/jpeg,image/webp,image/gif">
          <div class="icon-actions">
            <label class="secondary-button" for="icon-input">Choose image</label>
            <button id="reset-icon" class="text-button" type="button" hidden>Reset</button>
          </div>
        </div>

        <form id="metadata-form" class="metadata" novalidate>
          <div class="field">
            <div class="field-top"><label for="app-name">App name</label><span id="name-count">0 / 511 bytes</span></div>
            <input id="app-name" type="text" autocomplete="off" placeholder="My Homebrew">
          </div>
          <div class="field">
            <div class="field-top"><label for="app-author">Author</label><span id="author-count">0 / 255 bytes</span></div>
            <input id="app-author" type="text" autocomplete="off" placeholder="Your name">
          </div>
          <div class="field">
            <div class="field-top"><label for="app-version">Version</label><span id="version-count">0 / 15 bytes</span></div>
            <input id="app-version" type="text" autocomplete="off" placeholder="1.0.0">
          </div>
          <div id="edit-error" class="notice error" role="alert" hidden></div>
        </form>
      </div>

      <div class="export-row">
        <span><strong>Ready to export</strong><small id="output-size"></small></span>
        <button id="download-button" class="primary-button" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4v11m0 0 4-4m-4 4-4-4M5 19h14"/></svg>
          Download patched NRO
        </button>
      </div>
    </section>

    <footer>Private, local, and open source.</footer>
  </main>
  <script type="module" src="script.js"></script>
</body>
</html>
